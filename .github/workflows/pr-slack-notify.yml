name: PR Slack Notify

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Send pull request summary to Slack
    runs-on: ubuntu-latest

    steps:
      - name: Post PR details
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.PR_SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning("Skipping Slack PR notification because PR_SLACK_WEBHOOK_URL is not configured.");
              return;
            }

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const action = context.payload.action.replace(/_/g, " ");

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const maxFiles = 12;
            const statusLabels = {
              added: "Added",
              modified: "Modified",
              removed: "Removed",
              renamed: "Renamed",
              copied: "Copied",
              changed: "Changed",
              unchanged: "Unchanged",
            };

            const fileSummary = files
              .slice(0, maxFiles)
              .map((file) => {
                const status = statusLabels[file.status] || file.status;
                return `- *${status}* \`${file.filename}\`  +${file.additions} / -${file.deletions}`;
              })
              .join("\n");
            const fileOverflow = files.length > maxFiles
              ? `\n- _${files.length - maxFiles} more file(s) in the PR_`
              : "";

            const body = (pr.body || "_No PR description provided._").trim();
            const bodyLimit = 1200;
            const safeBody = body
              .replace(/@(channel|here|everyone)/gi, "@\u200b$1")
              .slice(0, bodyLimit);
            const bodySuffix = body.length > bodyLimit
              ? "\n\n_Description trimmed. Open the PR for the full text._"
              : "";

            const base = pr.base.ref;
            const head = pr.head.ref;
            const draftLabel = pr.draft ? "Draft" : "Ready";
            const reviewUrl = `${pr.html_url}/files`;
            const checksUrl = `${pr.html_url}/checks`;
            const actionLabel = action.charAt(0).toUpperCase() + action.slice(1);

            const section = (text) => ({
              type: "section",
              text: {
                type: "mrkdwn",
                text: text.slice(0, 3000),
              },
            });

            const blocks = [
              {
                type: "header",
                text: {
                  type: "plain_text",
                  text: `PR #${pr.number}: ${pr.title}`.slice(0, 150),
                },
              },
              {
                type: "context",
                elements: [
                  {
                    type: "mrkdwn",
                    text: `*${actionLabel}* by *${pr.user.login}* | *${draftLabel}* | \`${head}\` -> \`${base}\``,
                  },
                ],
              },
              { type: "divider" },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: `*Files changed*\n${files.length}` },
                  { type: "mrkdwn", text: `*Checks*\n<${checksUrl}|View checks>` },
                  { type: "mrkdwn", text: `*Diff*\n<${reviewUrl}|Files changed>` },
                  { type: "mrkdwn", text: `*State*\n${draftLabel}` },
                ],
              },
              section(`*Description*\n${safeBody + bodySuffix}`),
              section(`*Changed files*\n${fileSummary || "_No files reported by GitHub yet._"}${fileOverflow}`),
              {
                type: "actions",
                elements: [
                  {
                    type: "button",
                    text: {
                      type: "plain_text",
                      text: "Open PR",
                    },
                    style: "primary",
                    url: pr.html_url,
                  },
                  {
                    type: "button",
                    text: {
                      type: "plain_text",
                      text: "Review Diff",
                    },
                    url: reviewUrl,
                  },
                ],
              },
            ];

            const fallbackText = [
              `Pizza Logs PR #${pr.number}: ${pr.title}`,
              `${actionLabel} by ${pr.user.login} | ${draftLabel} | ${head} -> ${base}`,
              `${files.length} changed file(s)`,
              pr.html_url,
            ].join("\n");

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                text: fallbackText,
                unfurl_links: false,
                unfurl_media: false,
                blocks,
              }),
            });

            if (!response.ok) {
              const details = await response.text();
              core.setFailed(`Slack webhook rejected the PR notification: ${response.status} ${details}`);
            }
